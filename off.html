<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<title>Cell Seek3r</title>
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0f1e;--card:rgba(90,160,255,.09);--stroke:rgba(120,180,255,.22);--txt:#eaf2ff;--muted:#93a4c4;--red:#ff5b7a;--green:#22c55e;--amber:#fbbf24;--cyan:#22d3ee;--blue:#2563eb}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{max-width:480px;margin:0 auto;min-height:100vh;padding:30px 20px calc(34px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:22px}
body::before{content:"";position:fixed;inset:-10%;z-index:-1;background:radial-gradient(46% 32% at 16% -2%,rgba(34,211,238,.26),transparent 62%),radial-gradient(42% 30% at 94% 10%,rgba(59,130,246,.24),transparent 60%),radial-gradient(52% 42% at 62% 110%,rgba(56,189,248,.16),transparent 60%)}
h1{font-size:23px;margin:0;display:flex;align-items:center;gap:10px}
h1 .b{width:36px;height:36px;border-radius:11px;background:linear-gradient(140deg,var(--cyan),var(--blue));display:grid;place-items:center;font-size:19px;box-shadow:0 4px 14px rgba(37,99,235,.55)}
.spacer{flex:1}
.badge{text-align:center;padding:46px 18px;border-radius:26px;font-weight:800;letter-spacing:1px;backdrop-filter:blur(12px);border:1px solid var(--stroke);background:var(--card);transition:.25s}
.badge .big{font-size:38px;line-height:1.1;display:block}
.badge .sm{font-size:14px;font-weight:600;letter-spacing:0;color:var(--muted);display:block;margin-top:10px;word-break:break-all}
.badge.green{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.55)}.badge.green .big{color:#7bf0a8}
.badge.red{background:rgba(255,84,104,.16);border-color:rgba(255,84,104,.6);animation:pulse 1.6s infinite}.badge.red .big{color:#ffb0c2}
.badge.wait .big{color:var(--amber);font-size:26px}
.badge.idle .big{color:var(--muted);font-size:26px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.74}}
.btn{width:100%;padding:26px;border-radius:22px;border:none;font-size:21px;font-weight:800;color:#05121f;background:linear-gradient(135deg,var(--cyan),var(--blue));box-shadow:0 12px 34px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.35)}
.btn.cut{background:linear-gradient(135deg,#ff5468,#e23b50);color:#fff;box-shadow:0 12px 34px rgba(255,84,104,.42)}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.hint{color:var(--muted);font-size:12px;text-align:center;line-height:1.6}
details{color:var(--muted);font-size:12px;margin-top:2px}
details summary{cursor:pointer;text-align:center;list-style:none}
.logbar{display:flex;gap:8px;margin:10px 0}
.logbar button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--stroke);background:var(--card);color:var(--txt);font-size:12px;font-weight:600}
#log{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;background:rgba(0,0,0,.32);border-radius:10px;padding:10px;white-space:pre-wrap;max-height:180px;overflow:auto}
</style>
</head>
<body>
  <h1><span class="b">🔎</span> Cell Seek3r</h1>

  <div class="spacer"></div>

  <div class="badge idle" id="badge"><span class="big">Not connected</span><span class="sm">Tap Connect to read a cell</span></div>

  <div class="spacer"></div>

  <button class="btn" id="btn">Connect</button>
  <div class="hint" id="hint">Chrome or Edge on Android. Green = battery still live · Red = discharge cut.</div>

  <details id="logbox">
    <summary>Debug log</summary>
    <div class="logbar">
      <button id="dl">⬇ Download log</button>
      <button id="clr">Clear</button>
    </div>
    <div id="log"></div>
  </details>

<script>
"use strict";
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const hx=a=>[...a].map(b=>b.toString(16).padStart(2,"0").toUpperCase()).join(" ");
const S={dev:null,gatt:null,svc:null,write:null,notifies:[],buf:[],info:null,busy:false,connected:false,wantConnected:false,reconnecting:false,wr:false,framing:"jbd"};

/* ---- log ---- */
let SESSION=[]; try{SESSION=JSON.parse(localStorage.getItem("bms_session_log")||"[]");}catch(e){}
function rec(ev,detail){const e={t:new Date().toISOString(),dev:(S.dev&&S.dev.name)||"-",proto:S.framing,ev,detail:detail||""};
  SESSION.push(e); if(SESSION.length>4000)SESSION.splice(0,SESSION.length-4000);
  try{localStorage.setItem("bms_session_log",JSON.stringify(SESSION));}catch(e){}
  const el=$("log"); if(el)el.textContent=(`${e.t.slice(11,19)} [${S.framing}] ${ev}${detail?": "+detail:""}\n`+el.textContent).slice(0,10000);}
function dlLog(){if(!SESSION.length){alert("Log is empty");return;}
  const txt="Cell Seek3r log\n"+SESSION.map(e=>`${e.t} [${e.proto}] [${e.dev}] ${e.ev}${e.detail?": "+e.detail:""}`).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([txt],{type:"text/plain"}));a.download="cellseek3r-log.txt";a.click();}
function clrLog(){SESSION=[];try{localStorage.removeItem("bms_session_log");}catch(e){}const el=$("log");if(el)el.textContent="(cleared)";}

/* ---- per-device winning-method memory ---- */
function devKey(){return (S.dev&&(S.dev.id||S.dev.name))||"?";}
function getPref(){try{return (JSON.parse(localStorage.getItem("bms_method_pref")||"{}"))[devKey()]||null;}catch(e){return null;}}
function setPref(m){try{const o=JSON.parse(localStorage.getItem("bms_method_pref")||"{}");o[devKey()]=m;localStorage.setItem("bms_method_pref",JSON.stringify(o));}catch(e){}}

/* UUIDs */
const JBD_SVC=0xff00,JBD_N=0xff01,JBD_W=0xff02,ALT_SVC=0xffe0,ALT_C=0xffe1,DALY_SVC=0xfff0,DALY_N=0xfff1,DALY_W=0xfff2;
const ALL_SVCS=[0xff00,0xff01,0xff02,0xffe0,0xffe1,0xfff0,0xfff1,0xfff2,0xfee0,0xfee7,0xffa0,0xffb0,0xffc0,0xffd0,0xae00,0xae30,0x1800,0x180a,0x180f];

/* JBD */
function jbdCs(b){let s=0;for(const x of b)s=(s+x)&0xFFFF;return (0x10000-s)&0xFFFF;}
function jbdRead(reg){const c=jbdCs([reg,0]);return new Uint8Array([0xDD,0xA5,reg,0,(c>>8)&255,c&255,0x77]);}
function jbdWrite(reg,data){const b=[reg,data.length,...data],c=jbdCs(b);return new Uint8Array([0xDD,0x5A,reg,data.length,...data,(c>>8)&255,c&255,0x77]);}
const jbdE1=on=>jbdWrite(0xE1,[0x00,on?0x00:0x02]);
const jbdFb=on=>jbdWrite(0xFB,[0x00,on?0x00:0x01]);
const FAC_ENTER=new Uint8Array([0xDD,0x5A,0x00,0x02,0x56,0x78,0xFF,0x30,0x77]);
const FAC_EXIT =new Uint8Array([0xDD,0x5A,0x01,0x02,0x28,0x28,0xFF,0xAD,0x77]);
/* Daly */
function dalyFrame(cmd,d8){const f=[0xA5,0x40,cmd,0x08,...d8];let s=0;for(const b of f)s=(s+b)&0xFF;f.push(s);return new Uint8Array(f);}
const dalyDischarge=on=>dalyFrame(0xD9,[on?1:0,0,0,0,0,0,0,0]);
const dalyReadMos=()=>dalyFrame(0x93,[0,0,0,0,0,0,0,0]);
/* JK */
function jkFrame(reg,value){const f=new Array(20).fill(0);f[0]=0xAA;f[1]=0x55;f[2]=0x90;f[3]=0xEB;f[4]=reg;f[5]=0x04;f[6]=value&0xFF;let s=0;for(let i=0;i<19;i++)s=(s+f[i])&0xFF;f[19]=s;return new Uint8Array(f);}
const jkDischarge=on=>jkFrame(0xAC,on?1:0);
const jkReadAll=()=>jkFrame(0x96,0);

/* transport & parse */
async function send(u8){if(!S.write||!S.connected)return;rec("TX",hx(u8));try{
  if(S.wr)await S.write.writeValue(u8);
  else if(S.write.writeValueWithoutResponse)await S.write.writeValueWithoutResponse(u8);
  else await S.write.writeValue(u8);
}catch(e){rec("TX err",e.message);}}
async function sendResp(u8){if(!S.write||!S.connected)return;rec("TX/resp",hx(u8));try{await S.write.writeValue(u8);}catch(e){rec("TX/resp err",e.message);}}
function readStatusCmd(){if(S.framing==="daly")return dalyReadMos();if(S.framing==="jk")return jkReadAll();return jbdRead(0x03);}
function onData(ev){const src=ev.target.uuid?ev.target.uuid.slice(4,8):"?";const v=ev.target.value;const chunk=[];for(let i=0;i<v.byteLength;i++)chunk.push(v.getUint8(i));
  rec("RX@"+src,hx(chunk));
  if(S.framing==="jk")return;for(const b of chunk)S.buf.push(b);
  if(S.framing==="daly")return parseDaly();return parseJbd();}
function parseJbd(){let g=0;while(S.buf.length>=7&&g++<40){
  const st=S.buf.indexOf(0xDD);if(st<0){S.buf=[];break;}if(st>0)S.buf.splice(0,st);
  if(S.buf.length<4)break;const len=S.buf[3],total=4+len+3;if(S.buf.length<total)break;
  if(S.buf[total-1]!==0x77){S.buf.shift();continue;}
  const reg=S.buf[1],p=S.buf.slice(4,4+len),frame=S.buf.slice(0,total);S.buf.splice(0,total);
  rec("RX",hx(frame));
  if(reg===0x03){try{const u16=i=>(p[i]<<8)|p[i+1];S.info={voltage:u16(0)/100,soc:p[19],chargeFet:!!(p[20]&1),dischargeFet:!!(p[20]&2)};rec("STATUS","V="+S.info.voltage.toFixed(2)+" SOC="+S.info.soc+" dsg="+S.info.dischargeFet);render();}catch(e){}}
}}
function parseDaly(){let g=0;while(S.buf.length>=13&&g++<40){
  const st=S.buf.indexOf(0xA5);if(st<0){S.buf=[];break;}if(st>0)S.buf.splice(0,st);
  if(S.buf.length<13)break;const frame=S.buf.slice(0,13);let s=0;for(let i=0;i<12;i++)s=(s+frame[i])&0xFF;
  if(s!==frame[12]){S.buf.shift();continue;}S.buf.splice(0,13);rec("RX",hx(frame));
  const cmd=frame[2],d=frame.slice(4,12);
  if(cmd===0x93){S.info=Object.assign({},S.info,{chargeFet:!!d[1],dischargeFet:!!d[2]});render();}
  else if(cmd===0x90){S.info=Object.assign({},S.info,{voltage:((d[0]<<8)|d[1])/10,soc:Math.round(((d[6]<<8)|d[7])/10)});render();}
}}

/* discharge escalation */
async function confirm(want,ms){const t0=Date.now();while(Date.now()-t0<ms){if(!S.connected)return false;await send(readStatusCmd());await sleep(450);if(S.info&&S.info.dischargeFet===want)return true;}return false;}
async function doDischarge(want){
  const V=[
    ["E1",async()=>{await send(jbdE1(want));}],
    ["FB",async()=>{await send(jbdFb(want));}],
    ["E1+FB",async()=>{await send(jbdE1(want));await sleep(160);await send(jbdFb(want));}],
    ["config",async()=>{await send(FAC_ENTER);await sleep(230);await send(jbdE1(want));await sleep(160);await send(jbdFb(want));await sleep(230);await send(FAC_EXIT);}],
    ["both-off",async()=>{if(!want)await send(jbdWrite(0xE1,[0,3]));}],
    ["reply",async()=>{await sendResp(jbdE1(want));await sleep(160);await sendResp(jbdFb(want));}],
    ["Daly",async()=>{await send(dalyDischarge(want));}],
    ["JK",async()=>{await send(jkReadAll());await sleep(200);await send(jkDischarge(want));}]
  ];
  const pref=getPref();
  if(pref){const i=V.findIndex(x=>x[0]===pref);if(i>0){const m=V.splice(i,1)[0];V.unshift(m);rec("memory","trying remembered method '"+pref+"' first");}}
  for(const [n,run] of V){if(!S.connected){rec("aborted","link lost mid-cut");return null;}setBadge("wait","Cutting…","method "+n);rec("attempt",n);try{await run();}catch(e){}if(await confirm(want,4000)){rec("OK",n);setPref(n);return n;}}
  rec("FAILED","all methods exhausted");return null;
}

/* connect */
/* Full GATT walk: log every service+characteristic, subscribe to ALL notify chars, pick the best write char.
   Clones advertise FF00 but stream on other characteristics — this finds them and records the map for debugging. */
async function discoverAll(){
  S.svc=null;S.write=null;S.notifies=[];S.framing="jbd";
  let svcs=[];
  try{svcs=await S.gatt.getPrimaryServices();}catch(e){rec("gatt err","getPrimaryServices "+e.message);}
  rec("GATT",svcs.length+" service(s)");
  let wJbd=null,wDaly=null,wAlt=null,wAny=null;
  for(const s of svcs){
    const su=s.uuid.slice(4,8);
    let chars=[];try{chars=await s.getCharacteristics();}catch(e){rec("svc err",su+" "+e.message);continue;}
    for(const c of chars){
      const p=c.properties||{};const cu=c.uuid.slice(4,8);
      const flags=(p.write?"W":"")+(p.writeWithoutResponse?"w":"")+(p.notify?"N":"")+(p.indicate?"I":"")+(p.read?"R":"");
      rec("CHAR",su+"/"+cu+" ["+flags+"]");
      if(p.notify||p.indicate){try{await c.startNotifications();c.addEventListener("characteristicvaluechanged",onData);S.notifies.push(c);}catch(e){rec("notify fail",su+"/"+cu);}}
      if(p.write||p.writeWithoutResponse){
        if(su==="ff00"&&cu==="ff02")wJbd=c; else if(su==="fff0"&&cu==="fff2")wDaly=c; else if(su==="ffe0")wAlt=c;
        if(!wAny)wAny=c;
      }
    }
  }
  if(wJbd){S.write=wJbd;S.framing="jbd";}
  else if(wDaly){S.write=wDaly;S.framing="daly";}
  else if(wAlt){S.write=wAlt;S.framing="jbd";}
  else if(wAny){S.write=wAny;S.framing="jbd";}
  if(S.write)S.svc=S.write.service;
  rec("WRITE",S.write?(S.write.uuid.slice(4,8)+" framing="+S.framing+" notify="+S.notifies.length):"NONE FOUND");
  if(!S.write)throw new Error("no writable characteristic");
}
function setBadge(cls,big,sm){const b=$("badge");b.className="badge "+cls;b.innerHTML='<span class="big">'+big+'</span>'+(sm?'<span class="sm">'+sm+'</span>':'');}

/* open GATT + services + notifications (reused by connect and the watchdog) */
async function attachGatt(){
  let last=null;
  for(let a=0;a<3;a++){try{S.gatt=await S.dev.gatt.connect();last=null;break;}catch(e){last=e;rec("connect retry",(a+1)+" "+e.message);await sleep(700);}}
  if(last)throw last;
  S.buf=[];await discoverAll();
  S.connected=true;
}
function haveStatus(){return S.info&&S.info.dischargeFet!=null;}
async function readInitial(n){
  for(let i=0;i<(n||8)&&!haveStatus();i++){await send(readStatusCmd());await sleep(320);}
  if(!haveStatus()&&!S.wr){S.wr=true;rec("mode","no reply — retrying with write-with-response");for(let i=0;i<6&&!haveStatus();i++){await send(readStatusCmd());await sleep(320);}}
}

/* watchdog: silently reconnect if the link drops (unless the user meant to leave) */
async function onDrop(){
  S.connected=false;
  if(!S.wantConnected||S.reconnecting){render();return;}
  S.reconnecting=true;
  rec("DROP","link lost — reconnecting");
  for(let i=0;i<6&&S.wantConnected;i++){
    setBadge("wait","Reconnecting…","attempt "+(i+1));
    try{ await attachGatt(); rec("RECONNECTED"); S.reconnecting=false; await readInitial(6); render(); return; }
    catch(e){ rec("reconnect fail",e.message); await sleep(1500); }
  }
  S.reconnecting=false; rec("reconnect gave up"); render();
}
function armDropWatch(){ if(S.dev&&!S.dev._drop){S.dev._drop=true;S.dev.addEventListener("gattserverdisconnected",onDrop);} }

async function connect(){
  if(S.busy)return;
  if(!navigator.bluetooth){setBadge("idle","Use Chrome/Edge","Web Bluetooth not supported here");return;}
  S.wantConnected=false;
  try{S.gatt&&S.gatt.connected&&S.gatt.disconnect();}catch(e){}
  S.connected=false;S.info=null;S.wr=false;S.busy=true;render();
  try{
    S.dev=await navigator.bluetooth.requestDevice({
      filters:[
        {services:[JBD_SVC]},{services:[ALT_SVC]},{services:[DALY_SVC]},
        {namePrefix:"TK"},{namePrefix:"INE"},{namePrefix:"EN"},{namePrefix:"KLB"},{namePrefix:"EAGAL"},{namePrefix:"51."},
        {namePrefix:"BMS"},{namePrefix:"JBD"},{namePrefix:"GR"},{namePrefix:"Xiaoxiang"},{namePrefix:"xiaoxiang"},{namePrefix:"Daly"},{namePrefix:"JK"},{namePrefix:"Batt"}
      ],
      optionalServices:ALL_SVCS
    });
    rec("SELECTED",(S.dev.name||"BMS")+" id="+S.dev.id);
    armDropWatch();
    setBadge("wait","Connecting…",S.dev.name||"BMS");
    await attachGatt();rec("connected");
    S.wantConnected=true;
    setBadge("wait","Reading…",S.dev.name||"BMS");
    await readInitial(8);
  }catch(e){rec("error",e.message);S.connected=false;}
  finally{S.busy=false;render();}
}
async function cut(){
  if(!S.connected||S.busy)return;
  S.busy=true;render();rec("CUT requested");
  try{const worked=await doDischarge(false);rec("cut result",worked||"unconfirmed");}catch(e){rec("cut err",e.message);}
  finally{S.busy=false;render();}
}

function render(){
  const b=$("btn");
  if(S.busy){b.disabled=true;return;}
  b.disabled=false;
  if(!S.connected){setBadge("idle","Not connected","Tap Connect to read a cell");b.textContent="Connect";b.className="btn";return;}
  const name=(S.dev&&S.dev.name)||"BMS";
  const live=S.info?S.info.dischargeFet:true;
  const v=S.info&&S.info.voltage!=null?S.info.voltage.toFixed(2)+" V":"";
  const soc=S.info&&S.info.soc!=null?" · "+S.info.soc+"%":"";
  const mem=getPref();
  if(live){setBadge("green","NOT CUT",name+(v?" · "+v+soc:"")+(mem?" · ⚡ "+mem:""));b.textContent="⏻ Cut battery";b.className="btn cut";}
  else{setBadge("red","CUT",name+(v?" · "+v+soc:""));b.textContent="Connect another";b.className="btn";}
}

$("btn").onclick=()=>{ if(S.connected && S.info && S.info.dischargeFet===false) connect(); else if(S.connected) cut(); else connect(); };
$("dl").onclick=dlLog; $("clr").onclick=clrLog;
rec("ready");render();
</script>
</body>
</html>
